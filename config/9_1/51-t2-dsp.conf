# WirePlumber configuration for T2 MacBook Air 9,1 DSP
# Uses node.software-dsp module like Asahi Linux to properly hide raw devices

# Create DSP filter chain and hide raw device
node.software-dsp.rules = [
    # Speakers DSP
    {
        matches = [
            { api.alsa.card.name = "Apple T2 Audio", alsa.name = "Speaker" }
        ]
        actions = {
            create-filter = {
                filter-path = "/usr/share/t2-linux-audio/9_1/graph.json"
                hide-parent = true
            }
        }
    }
    # Mic DSP
    {
        matches = [
            { api.alsa.card.name = "Apple T2 Audio", alsa.name = "Digital Mic" }
        ]
        actions = {
            create-filter = {
                filter-path = "/usr/share/t2-linux-audio/9_1/mic.json"
                hide-parent = true
            }
        }
    }
]

# Enable required modules
wireplumber.profiles = {
    main = {
        node.software-dsp = required
    }
}

